<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prode — Administrador</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <main class="pantalla-centrada">

    <!-- Vista de login (se muestra cuando NO estas logueado) -->
    <section id="login-view" class="tarjeta" style="display:none;">
      <h1 class="titulo-chico">PRODE</h1>
      <p class="subtitulo">Panel de Administrador</p>

      <form id="form-login" class="formulario">
        <input type="text" id="usuario" placeholder="Usuario" autocomplete="username" required />
        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required />
        <button type="submit">Entrar</button>
        <p class="error" id="error"></p>
      </form>
    </section>

    <!-- Vista del panel (se muestra cuando SI estas logueado) -->
    <section id="panel-view" class="tarjeta tarjeta-ancha" style="display:none;">
      <h1 class="titulo-chico">Panel de Administrador</h1>
      <p class="subtitulo">Gestión de jugadores</p>

      <h2 class="subtitulo-seccion">Grupos (ligas privadas)</h2>
      <form id="form-grupo" class="formulario formulario-fila">
        <input type="text" id="nombre-grupo" placeholder="Nombre del grupo (ej: Trabajo)" required />
        <button type="submit">Crear grupo</button>
      </form>
      <ul id="lista-grupos" class="lista-grupos"></ul>

      <h2 class="subtitulo-seccion">Crear jugador</h2>
      <form id="form-jugador" class="formulario">
        <input type="text" id="nombre-jugador" placeholder="Nombre del jugador" required />
        <select id="grupo-jugador" class="selector" required></select>
        <button type="submit">Crear y generar link</button>
      </form>
      <p class="error" id="error-jugador"></p>

      <h2 class="subtitulo-seccion">Jugadores</h2>
      <ul id="lista-jugadores" class="lista-jugadores"></ul>

      <h2 class="subtitulo-seccion">Fixture</h2>
      <button id="btn-sincronizar" type="button">Sincronizar desde API</button>
      <p class="texto-ayuda" id="estado-fixture"></p>
      <p class="texto-ayuda" id="conteo-partidos">Partidos cargados: —</p>

      <h3 class="subtitulo-mini">Cargar partido manual</h3>
      <form id="form-partido" class="formulario">
        <div class="fila-campos">
          <input type="text" id="m-temporada" placeholder="Temporada (ej: 2026)" required />
          <input type="number" id="m-fecha" placeholder="N° fecha" required />
        </div>
        <input type="text" id="m-local" placeholder="Equipo local" required />
        <input type="text" id="m-visitante" placeholder="Equipo visitante" required />
        <input type="datetime-local" id="m-inicio" />
        <input type="text" id="m-estadio" placeholder="Estadio (opcional)" />
        <button type="submit">Cargar partido</button>
        <p class="error" id="error-partido"></p>
      </form>

      <h3 class="subtitulo-mini">Editar / borrar por fecha</h3>
      <div class="fila-campos">
        <input type="text" id="v-temporada" placeholder="Temporada" />
        <input type="number" id="v-fecha" placeholder="N° fecha" />
        <button type="button" id="btn-ver-fecha">Ver</button>
      </div>
      <ul id="lista-admin-partidos" class="lista-jugadores"></ul>

      <button id="btn-logout" class="boton-secundario">Cerrar sesión</button>
    </section>

  </main>

  <script src="js/admin.js"></script>
</body>
</html>
