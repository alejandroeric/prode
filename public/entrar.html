<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prode — Entrar</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#050a06" />
  <link rel="apple-touch-icon" href="/icono.svg" />
</head>
<body>
  <main class="pantalla-centrada">
    <section class="tarjeta">
      <h1 class="titulo-chico">PRODE</h1>
      <p class="subtitulo">Liga Profesional Argentina</p>

      <!-- Mensaje de estado (validando / errores / hola de nuevo) -->
      <p class="estado" id="estado">Validando tu acceso...</p>

      <!-- Boton para entrar a la app (aparece cuando el ingreso fue exitoso) -->
      <a id="ir-app" class="boton-secundario" href="fixture.html" style="display:none;">Entrar al Prode →</a>

      <!-- Bienvenida para jugadores nuevos (oculta hasta que haga falta) -->
      <div id="bienvenida" style="display:none;">
        <h2 class="subtitulo-seccion">¡Bienvenido al Prode!</h2>
        <p class="texto-ayuda">Elegí tu nombre y un avatar para empezar.</p>

        <form id="form-perfil" class="formulario">
          <input type="text" id="nombre" placeholder="Tu nombre" maxlength="20" required />

          <p class="texto-ayuda">Elegí tu avatar:</p>
          <div class="avatares" id="avatares"></div>

          <button type="submit">Empezar a jugar</button>
          <p class="error" id="error-perfil"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="js/util.js"></script>
  <script src="js/entrar.js"></script>
</body>
</html>
